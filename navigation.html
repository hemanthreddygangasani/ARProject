<!DOCTYPE html>
<html>
<head>
    <title>Wedding AR Invitation</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // 1. Model Debugger
        AFRAME.registerComponent('model-debugger', {
            init: function () {
                const log = document.getElementById('debug-text');
                
                this.el.addEventListener('model-loaded', () => {
                    log.innerHTML = "✅ Invitation Loaded! Point at Marker.";
                    log.style.color = "green";
                });
                
                this.el.addEventListener('model-error', (error) => {
                    log.innerHTML = "❌ Model Error: Ensure file is exactly named 'model.glb'";
                    log.style.color = "red";
                });
            }
        });

        // 2. Mobile-Safe Navigation Button
        AFRAME.registerComponent('nav-button', {
            init: function () {
                let el = this.el;
                let isClicked = false; // Prevents double-firing on phones

                let navigate = function (e) {
                    if (isClicked) return;
                    isClicked = true;
                    
                    // Visual feedback: flash white so the user knows they tapped it
                    el.setAttribute('color', '#FFFFFF');
                    
                    // Redirect to the map after a tiny delay
                    setTimeout(() => {
                        window.location.href = 'navigation.html';
                    }, 200);
                };

                // Listen to both PC clicks and Mobile screen taps
                el.addEventListener('click', navigate);
                el.addEventListener('touchstart', navigate, {passive: true});
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <div style="position: fixed; top: 10px; left: 10px; z-index: 9999; background: white; padding: 15px; border: 2px solid black; font-family: sans-serif; font-weight: bold;">
        <span id="debug-text" style="color: orange;">Scanning pattern...</span>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;"
             cursor="rayOrigin: mouse; fuse: false;"
             raycaster="objects: .clickable">
        
        <a-assets>
            <a-asset-item id="my-model" src="model.glb"></a-asset-item>
            <img id="petal-texture" src="petals.png">
            <img id="board-texture" src="board.png">
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt" emitevents="true">
            
            <a-light type="ambient" color="#FFF" intensity="2.0"></a-light>
            
            <a-entity
                gltf-model="#my-model"
                position="0 0 0"
                scale="4.5 4.5 4.5" 
                rotation="-90 0 0"
                model-debugger>
            </a-entity>

            <a-plane
                material="src: #board-texture; transparent: true; side: double;"
                geometry="primitive: plane; width: 2.2; height: 3.0;"
                position="1.5 0 -0.5"
                rotation="0 -20 0">
            </a-plane>

            <a-entity 
                position="0 0.5 1.5" 
                animation="property: position; from: 0 0.2 1.5; to: 0 0.4 1.5; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine">
                
                <a-box class="clickable" nav-button color="#FFD700" depth="0.2" height="0.6" width="2.8"></a-box>
                
                <a-text 
                    value="START NAVIGATION" 
                    color="#000000" 
                    align="center" 
                    position="0 0 0.11" 
                    scale="0.8 0.8 0.8"
                    font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
                </a-text>
            </a-entity>

            <a-entity id="shower">
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="-1 4 0.5" animation__fall="property: position; from: -1 4 0.5; to: -1 -1.5 0.5; dur: 4000; easing: linear; loop: true; delay: 0;" animation__spin="property: rotation; from: 0 0 0; to: 360 720 360; dur: 4000; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="1.2 4 0.8" animation__fall="property: position; from: 1.2 4 0.8; to: 1.2 -1.5 0.8; dur: 3500; easing: linear; loop: true; delay: 500;" animation__spin="property: rotation; from: 0 0 0; to: 720 360 720; dur: 3500; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="0 4 1.2" animation__fall="property: position; from: 0 4 1.2; to: 0 -1.5 1.2; dur: 4500; easing: linear; loop: true; delay: 200;" animation__spin="property: rotation; from: 0 0 0; to: 1080 360 1080; dur: 4500; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="-0.5 4 -0.2" animation__fall="property: position; from: -0.5 4 -0.2; to: -0.5 -1.5 -0.2; dur: 3800; easing: linear; loop: true; delay: 1000;" animation__spin="property: rotation; from: 0 0 0; to: 360 360 360; dur: 3800; easing: linear; loop: true;"></a-plane>

                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.08; height: 0.08;" position="0.5 4 0" animation__fall="property: position; from: 0.5 4 0; to: 0.5 -1.5 0; dur: 6000; easing: linear; loop: true; delay: 1500;" animation__spin="property: rotation; from: 0 0 0; to: 360 360 720; dur: 6000; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="-1.2 4 1" animation__fall="property: position; from: -1.2 4 1; to: -1.2 -1.5 1; dur: 5500; easing: linear; loop: true; delay: 800;" animation__spin="property: rotation; from: 0 0 0; to: 720 720 360; dur: 5500; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="0.8 4 -0.8" animation__fall="property: position; from: 0.8 4 -0.8; to: 0.8 -1.5 -0.8; dur: 6500; easing: linear; loop: true; delay: 2500;" animation__spin="property: rotation; from: 0 0 0; to: 360 1080 1080; dur: 6500; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.09; height: 0.09;" position="-0.2 4 -0.5" animation__fall="property: position; from: -0.2 4 -0.5; to: -0.2 -1.5 -0.5; dur: 5800; easing: linear; loop: true; delay: 1800;" animation__spin="property: rotation; from: 0 0 0; to: 1080 360 720; dur: 5800; easing: linear; loop: true;"></a-plane>

                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="1.8 4 0.3" animation__fall="property: position; from: 1.8 4 0.3; to: 1.8 -1.5 0.3; dur: 4800; easing: linear; loop: true; delay: 3000;" animation__spin="property: rotation; from: 0 0 0; to: 720 360 1080; dur: 4800; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.08; height: 0.08;" position="1 4 -0.6" animation__fall="property: position; from: 1 4 -0.6; to: 1 -1.5 -0.6; dur: 5200; easing: linear; loop: true; delay: 3500;" animation__spin="property: rotation; from: 0 0 0; to: 360 720 1080; dur: 5200; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.11; height: 0.11;" position="2 4 -1.2" animation__fall="property: position; from: 2 4 -1.2; to: 2 -1.5 -1.2; dur: 4200; easing: linear; loop: true; delay: 4000;" animation__spin="property: rotation; from: 0 0 0; to: 1080 1080 360; dur: 4200; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="0.3 4 -1.5" animation__fall="property: position; from: 0.3 4 -1.5; to: 0.3 -1.5 -1.5; dur: 4600; easing: linear; loop: true; delay: 4500;" animation__spin="property: rotation; from: 0 0 0; to: 360 360 1080; dur: 4600; easing: linear; loop: true;"></a-plane>

                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="-1.5 4 -0.8" animation__fall="property: position; from: -1.5 4 -0.8; to: -1.5 -1.5 -0.8; dur: 5100; easing: linear; loop: true; delay: 5000;" animation__spin="property: rotation; from: 0 0 0; to: 720 1080 360; dur: 5100; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="0.7 4 1.5" animation__fall="property: position; from: 0.7 4 1.5; to: 0.7 -1.5 1.5; dur: 4900; easing: linear; loop: true; delay: 5500;" animation__spin="property: rotation; from: 0 0 0; to: 360 720 1080; dur: 4900; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="-0.8 4 1.3" animation__fall="property: position; from: -0.8 4 1.3; to: -0.8 -1.5 1.3; dur: 5300; easing: linear; loop: true; delay: 6000;" animation__spin="property: rotation; from: 0 0 0; to: 1080 360 720; dur: 5300; easing: linear; loop: true;"></a-plane>
                <a-plane material="src: #petal-texture; transparent: true; alphaTest: 0.5; side: double;" geometry="primitive: plane; width: 0.1; height: 0.1;" position="1.3 4 0.1" animation__fall="property: position; from: 1.3 4 0.1; to: 1.3 -1.5 0.1; dur: 4700; easing: linear; loop: true; delay: 6500;" animation__spin="property: rotation; from: 0 0 0; to: 360 360 1080; dur: 4700; easing: linear; loop: true;"></a-plane>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
