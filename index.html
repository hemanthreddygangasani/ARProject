<!DOCTYPE html>
<html>
<head>
    <title>Wedding AR - Final Assembly</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="couple" src="the_groom_and_bride.glb"></a-asset-item>
            <a-asset-item id="gate" src="wedding_gate.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-light type="ambient" color="#FFF" intensity="1.2"></a-light>
            <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
            
            <a-entity
                gltf-model="#gate"
                position="0 0 0"
                scale="1 1 1" 
                rotation="-90 0 0">
            </a-entity>

            <a-entity
                gltf-model="#couple"
                position="0 0.05 0"
                scale="1.5 1.5 1.5" 
                rotation="-90 0 0">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
