<!DOCTYPE html>
<html>
<head>
    <title>Premium AR Wedding Stage</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Keeping the debugger so we know if the heavy files load!
        AFRAME.registerComponent('scene-debugger', {
            init: function () {
                const log = document.getElementById('debug-text');
                this.el.addEventListener('markerFound', () => {
                    log.innerHTML = "✅ Pattern Found! Loading 3D assets...";
                    log.style.color = "green";
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <div style="position: fixed; top: 10px; left: 10px; z-index: 9999; background: white; padding: 15px; border: 2px solid black; font-family: sans-serif; font-weight: bold;">
        <span id="debug-text" style="color: orange;">Scanning pattern...</span>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
        
        <a-assets>
            <a-asset-item id="couple-model" src="model.glb"></a-asset-item>
            <a-asset-item id="stage-model" src="stage.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt" scene-debugger>
            
            <a-light type="ambient" color="#FFF" intensity="1.8"></a-light>
            <a-light type="directional" color="#FFF" intensity="0.5" position="-1 2 1"></a-light>
            
            <a-entity
                gltf-model="#stage-model"
                position="0 0 0"
                scale="1 1 1" 
                rotation="-90 0 0">
            </a-entity>

            <a-entity
                gltf-model="#couple-model"
                position="0 0.1 0.5"
                scale="5 5 5" 
                rotation="-90 0 0">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
