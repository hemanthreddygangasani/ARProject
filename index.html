<!DOCTYPE html>
<html>
<head>
    <title>Model Fixer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('model-debugger', {
            init: function () {
                const log = document.getElementById('debug-text');
                
                // If the model successfully downloads and renders
                this.el.addEventListener('model-loaded', () => {
                    log.innerHTML = "✅ Model Loaded! (If invisible, change scale)";
                    log.style.color = "green";
                });
                
                // If the file is broken, compressed, or missing
                this.el.addEventListener('model-error', (error) => {
                    log.innerHTML = "❌ Model Error: File broken, missing, or uses Draco compression.";
                    log.style.color = "red";
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <div style="position: fixed; top: 10px; left: 10px; z-index: 9999; background: white; padding: 15px; border: 2px solid black; font-family: sans-serif; font-weight: bold;">
        <span id="debug-text" style="color: orange;">Scanning pattern...</span>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
        
        <a-assets>
            <a-asset-item id="my-model" src="model.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-light type="ambient" color="#FFF" intensity="2.0"></a-light>
            
            <a-entity
                gltf-model="#my-model"
                position="0 0 0"
                scale="5 5 5" 
                rotation="-90 0 0"
                model-debugger>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
