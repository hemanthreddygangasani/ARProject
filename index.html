<!DOCTYPE html>
<html>
<head>
    <title>Optimized AR Model Test</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('model-checker', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    console.log('✅ SUCCESS: 3D Model loaded perfectly!');
                });
                this.el.addEventListener('model-error', (error) => {
                    console.error('❌ ERROR: Model failed to load. Check file name and size.', error);
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        renderer="colorManagement: true;">

        <a-assets>
            <a-asset-item id="wedding-model" src="model.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-light type="ambient" color="#FFF" intensity="1.5"></a-light>
            
            <a-entity 
                gltf-model="#wedding-model" 
                position="0 0.1 0" 
                scale="0.5 0.5 0.5" 
                rotation="-90 0 0"
                model-checker>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
