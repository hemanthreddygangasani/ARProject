<!DOCTYPE html>
<html>
<head>
    <title>Custom Pattern AR Test</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // On-Screen Debugger for the iPad
        AFRAME.registerComponent('debug-logger', {
            init: function () {
                const log = document.getElementById('debug-text');
                
                this.el.sceneEl.addEventListener('markerFound', () => {
                    log.innerHTML = "✅ CUSTOM MARKER FOUND!";
                    log.style.color = "green";
                });

                this.el.sceneEl.addEventListener('markerLost', () => {
                    log.innerHTML = "❌ MARKER LOST. Keep camera steady.";
                    log.style.color = "red";
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <div style="position: fixed; top: 10px; left: 10px; z-index: 9999; background: white; padding: 15px; border: 2px solid black; font-family: sans-serif; font-weight: bold;">
        Status: <span id="debug-text" style="color: orange;">Waiting for camera...</span>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="colorManagement: true;" debug-logger>

        <a-assets>
            <a-asset-item id="wedding-model" src="model.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-light type="ambient" color="#FFF" intensity="1.5"></a-light>
            
            <a-box position="0 0.5 0" scale="1 1 1" material="color: red; opacity: 0.8;"></a-box>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
