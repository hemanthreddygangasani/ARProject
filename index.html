<!DOCTYPE html>
<html>
<head>
    <title>Premium AR Stage</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
        
        <a-assets>
            <a-asset-item id="main-couple" src="model.glb"></a-asset-item>
            
            <a-asset-item id="indian-bg" src="background.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-light type="ambient" color="#FFF" intensity="1.5"></a-light>
            
            <a-entity
                gltf-model="#indian-bg"
                position="0 0 -1.0"
                scale="2 2 2" 
                rotation="-90 0 0">
            </a-entity>

            <a-entity
                gltf-model="#main-couple"
                position="0 0.1 0.5"
                scale="5 5 5" 
                rotation="-90 0 0">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
